<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="VOIDFORGE is a futuristic AI space experience system launching soon."
    />
    <title>VOIDFORGE | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="void-canvas" aria-hidden="true"></canvas>
    <div class="field-overlay" aria-hidden="true"></div>

    <main class="page-shell">
      <nav class="topbar" aria-label="VOIDFORGE status">
        <a class="brand-mark" href="/" aria-label="VOIDFORGE home">
          <span></span>
          VOIDFORGE
        </a>
        <div class="nav-status">
          <span class="live-dot"></span>
          Launch Sequence Active
        </div>
      </nav>

      <section class="hero" aria-label="VOIDFORGE launch">
        <div class="orbit-ring" aria-hidden="true"></div>
        <p class="eyebrow">Futuristic AI Space Experience</p>
        <h1>VOIDFORGE</h1>
        <p class="intro">
          A next-generation AI interface forged for cinematic space systems,
          deep signal intelligence, and orbital-grade digital experiences.
        </p>

        <div class="countdown" aria-label="Launch countdown">
          <div><strong id="days">000</strong><span>Days</span></div>
          <div><strong id="hours">00</strong><span>Hours</span></div>
          <div><strong id="minutes">00</strong><span>Minutes</span></div>
          <div><strong id="seconds">00</strong><span>Seconds</span></div>
        </div>

        <form id="subscribe-form" class="subscribe-form">
          <label class="sr-only" for="email">Email address</label>
          <input id="email" name="email" type="email" placeholder="Enter your email" autocomplete="email" required />
          <button type="submit">Notify Me</button>
        </form>
        <p id="form-message" class="form-message" role="status" aria-live="polite"></p>

        <div class="signal-row" aria-label="System highlights">
          <span>Warp Visuals</span>
          <span>AI Console</span>
          <span>Private Beta</span>
        </div>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./threejs-engine.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
